<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}AI金融助手{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">

        <nav class="navbar">
            <a 
                href="{{ url_for('home') }}" 

                class = "{% if request.endpoint == 'home' %}active{% endif %}" 
                >
                首页
            </a>

            <a 
                href="{{ url_for('history') }}"

                class = "{% if request.endpoint in ['history', 'history_detail'] %}active{% endif %}"
                >
                历史记录
        
            </a>
        </nav>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}

    </div>
</body>

</html>
