{% extends "base.html" %}

{% block title %}聊天历史记录详情{% endblock %}

{% block content %}
            <h1>聊天历史记录详情</h1>

            <p>
                <a href="{{ url_for('history') }}">返回历史记录列表</a>
            </p>

            <div class = "history-item">
                <p><strong>时间：</strong> {{record['created_at']}}</p>

                <div class = "detail-section">
                    <h3>user</h3>
                    <p>{{record['user_message']}}</p>
                </div>
                <div class = "detail-section">
                    <h3>AI</h3>
                    <p>{{record['ai_message']}}</p>
                </div>
            
                 <form method="POST" action="{{ url_for('delete_history_record', record_id=record['id']) }}" onsubmit="return confirm('确定要删除这条历史记录吗？')">
                     <button type="submit" class="danger-btn">删除</button>
                 </form>
            </div>
{% endblock %}
