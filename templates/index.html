<!DOCTYPE html>
<html>

<head>
    <title>AI金融助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
    <div class="container">

        <h1>AI金融助手</h1>
        
        <p>
            <a href="{{ url_for('history') }}">查看聊天历史记录</a>
        </p>

        <h3>当前对话数: {{ chat_count }}</h3>
        <div class = "quick-questions">
            
            {%for question in quick_questions %}
                <button type="button" class="quick-btn">{{ question }}</button>
            {%endfor%}
        </div>

        <form method="POST" id="chat-form">

            <input type="text" id="chat-input" name="user_input" placeholder="请输入客户需求" value="{{ user_input }}">

            <button type="submit" id="send-button">开始分析</button>

            

        </form>
        <p id="error-message" class="error-message"></p>
        <form method="POST" action="/clear">
            <button type="submit">清除对话</button>
        </form>
        
        <div class="result-box" id="chat-box">
            {% for message in messages %}
                  {% if message.role == "user" %}
                        <div class = "chat-row user-row">
                                <div class="message user-message">
                                   <strong>你：</strong>{{message.content}}
                                </div>
                                <div class = "avatar user-avatar">你</div>
                        </div>
                  {% elif message.role == "assistant" %}

                            <div class="chat-row ai-row">
                                <div class = "avatar ai-avatar">AI</div>
                                <div class="message ai-message">
                                     <strong>AI:</strong>{{message.content}}
                                </div>
                            </div>

                  {% endif %}
            {% endfor %}
        </div>

    </div>
<script>
    const chatBox = document.getElementById("chat-box");

    chatBox.scrollTop = chatBox.scrollHeight;

    const input = document.getElementById("chat-input");

    const form = document.getElementById("chat-form");

    const sendButton = document.getElementById("send-button");

    const errorMessage = document.getElementById("error-message");

    const quickButtons = document.querySelectorAll(".quick-btn");

    input.addEventListener("keydown", function(event) {

        if (event.key === "Enter") {
            
            event.preventDefault();

            form.requestSubmit();
        }
    });

    form.addEventListener("submit", function(event) {
        if(input.value.trim() === "") {
            event.preventDefault();
            
            errorMessage.innerText = "请输入客户需求！";

            input.focus();
            return;
        }
        errorMessage.innerText = "";
        sendButton.innerText = "AI思考中...";
        sendButton.disabled = true;
    });

    input.addEventListener("input", function() {
       
        errorMessage.innerText = "";
    });

    quickButtons.forEach(function(button){

        button.addEventListener("click", function() {

            input.value = button.innerText;

            input.focus();

        });

    })
</script>
</body>

</html>
