<!DOCTYPE html>
<html>

<head>
    <title>聊天历史记录</title>
    <link rel="stylesheet" href = "{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>聊天历史记录</h1>

        <p>
            <a href="{{ url_for('home') }}">返回聊天界面</a>
        </p>

        <div class="history-list">

            {% for record in history_records %}
            <div class="history-item">
                <p><strong>时间:</strong> {{ record['created_at'] }}</p>
                <p><strong>用户:</strong> {{ record['user_message'] }}</p>
                <p><strong>AI:</strong> {{ record['ai_message'] }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
